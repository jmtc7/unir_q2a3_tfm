version: "3.8"

services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: opsinsight_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  ocr:
    build: ./ocr
    container_name: ocr
    ports:
      - "8001:8000"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - N8N_SECURE_MODE=false
      - N8N_ENABLE_COMMUNITY_NODES=true
      - EXECUTIONS_PROCESS=main
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./tmp:/files
      - ./datos:/home/node/.n8n-files
    depends_on:
      - ollama
      - ocr
      - db
    restart: unless-stopped

volumes:
  n8n_data:
  ollama:
  mysql_data:
